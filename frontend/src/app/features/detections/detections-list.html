<fp-card>
	<header class="fp-page-header fp-list-header">
		<div>
			<h1 class="fp-page-title">Detections</h1>
			<p class="fp-page-subtitle">Exposure events for monitored payloads and samples.</p>
		</div>

		<a mat-flat-button color="primary" routerLink="/detections/new">
			<mat-icon>add</mat-icon>
			New detection
		</a>
	</header>

	<fp-loading-spinner [visible]="loading"></fp-loading-spinner>

	<ng-container *ngIf="!loading">
		<fp-empty-state
			*ngIf="data.length === 0"
			icon="visibility_off"
			title="No detections yet"
			body="Once your payloads are seen by monitored sources, they'll appear here."
		>
			<a mat-stroked-button color="primary" routerLink="/iocs">
				Manage IOCs
			</a>
		</fp-empty-state>

		<div class="fp-table-container" *ngIf="data.length > 0">
			<table mat-table [dataSource]="data" class="fp-table">
				<ng-container matColumnDef="name">
					<th mat-header-cell *matHeaderCellDef>Name</th>
					<td mat-cell *matCellDef="let det">
						<a [routerLink]="['/detections', det.file_hash]" class="fp-item-link">{{ det.name }}</a>
					</td>
				</ng-container>

				<ng-container matColumnDef="file_hash">
					<th mat-header-cell *matHeaderCellDef>Hash</th>
					<td mat-cell *matCellDef="let det" class="fp-mono">
						{{ det.file_hash }}
					</td>
				</ng-container>

				<ng-container matColumnDef="sources">
					<th mat-header-cell *matHeaderCellDef>Sources</th>
					<td mat-cell *matCellDef="let det">
						{{ getSourcesLabel(det) }}
					</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef>Status / Actions</th>
					<td mat-cell *matCellDef="let det" class="actions">
						<div class="actions-content">
							<span [class]="getStatusClass(det)">
								{{ getStatusLabel(det) }}
							</span>
							<button
								mat-icon-button
								color="primary"
								[routerLink]="['/detections', det.file_hash, 'edit']"
								aria-label="Edit"
							>
								<mat-icon>edit</mat-icon>
							</button>
						</div>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
			</table>
		</div>
	</ng-container>
</fp-card>
