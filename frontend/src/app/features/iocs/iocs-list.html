<fp-card>
	<header class="fp-page-header fp-list-header">
		<div>
			<h1 class="fp-page-title">IOCs</h1>
			<p class="fp-page-subtitle">Indicators monitored across threat intelligence sources.</p>
		</div>

		<a mat-flat-button color="primary" routerLink="/iocs/new">
			<mat-icon>add</mat-icon>
			New IOC
		</a>
	</header>

	<fp-loading-spinner [visible]="loading"></fp-loading-spinner>

	<ng-container *ngIf="!loading">
		<fp-empty-state
			*ngIf="data.length === 0"
			icon="fingerprint"
			title="No IOCs yet"
			body="Add hashes and payloads to monitor across intel sources."
		>
			<a mat-stroked-button color="primary" routerLink="/iocs/new">
				Add first IOC
			</a>
		</fp-empty-state>

		<div class="fp-table-container" *ngIf="data.length > 0">
			<table mat-table [dataSource]="data" class="fp-table">
				<ng-container matColumnDef="name">
					<th mat-header-cell *matHeaderCellDef>Name</th>
					<td mat-cell *matCellDef="let ioc">
						<a [routerLink]="['/iocs', ioc.name]" class="fp-item-link">{{ ioc.name }}</a>
					</td>
				</ng-container>

				<ng-container matColumnDef="file_hash">
					<th mat-header-cell *matHeaderCellDef>Hash</th>
					<td mat-cell *matCellDef="let ioc" class="fp-mono">
						{{ ioc.file_hash }}
					</td>
				</ng-container>

				<ng-container matColumnDef="poll_time">
					<th mat-header-cell *matHeaderCellDef>Poll (min)</th>
					<td mat-cell *matCellDef="let ioc">
						{{ ioc.poll_time }}
					</td>
				</ng-container>

				<ng-container matColumnDef="active">
					<th mat-header-cell *matHeaderCellDef>Status</th>
					<td mat-cell *matCellDef="let ioc">
						<span [class]="getStatusClass(ioc)">{{ getStatusLabel(ioc) }}</span>
					</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef>Actions</th>
					<td mat-cell *matCellDef="let ioc" class="actions">
						<div class="actions-content">
							<button
								mat-icon-button
								color="primary"
								[routerLink]="['/iocs', ioc.name, 'edit']"
								aria-label="Edit"
							>
								<mat-icon>edit</mat-icon>
							</button>
						</div>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
			</table>
		</div>
	</ng-container>
</fp-card>
