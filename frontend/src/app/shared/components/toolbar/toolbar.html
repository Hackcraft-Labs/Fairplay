<mat-toolbar color="primary" class="fp-toolbar">
	<button
		mat-icon-button
		class="fp-toolbar-menu"
		(click)="onToggleMenu()"
		aria-label="Toggle navigation"
	>
		<mat-icon>menu</mat-icon>
	</button>

	<div class="fp-toolbar-title-wrap">
		<span class="fp-toolbar-title">Fairplay</span>
		<span class="fp-toolbar-subtitle">Red Team Exposure Monitoring</span>
	</div>
	<span class="fp-toolbar-spacer"></span>

	<div class="fp-toolbar-user">
		<mat-icon>admin_panel_settings</mat-icon>
		<span>Operator</span>
	</div>

	<button mat-icon-button (click)="onToggleTheme()" aria-label="Toggle dark mode">
		<mat-icon>brightness_6</mat-icon>
	</button>
</mat-toolbar>
